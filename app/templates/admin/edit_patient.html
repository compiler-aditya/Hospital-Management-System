{% extends "base.html" %}

{% block title %}Edit Patient - HealthCare Plus{% endblock %}

{% block content %}
<div class="page-header d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
    <div>
        <h2 class="page-title"><i class="bi bi-pencil-square text-primary me-2"></i>Edit Patient Profile</h2>
        <p class="page-subtitle mb-0">Update information for {{ patient.full_name }}</p>
    </div>
    <div>
        <a href="{{ url_for('admin.patients') }}" class="btn btn-outline-secondary rounded-pill w-100">
            <i class="bi bi-arrow-left me-1"></i> Back to List
        </a>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="card border border-light shadow-sm rounded-2xl overflow-hidden bg-white">
            <div class="card-body p-4 p-lg-5">
                <form method="POST" action="{{ url_for('admin.edit_patient', patient_id=patient.id) }}">
                    <div class="bg-gray-50 p-4 rounded-xl border mb-4">
                        <h6 class="text-uppercase text-muted small fw-bold mb-4 letter-spacing-wide">
                            <i class="bi bi-person-lines-fill me-1"></i> Contact & Medical Info
                        </h6>
                        
                        <div class="mb-3">
                            <label for="full_name" class="form-label fw-medium small">Full Name</label>
                            <input type="text" class="form-control" id="full_name" name="full_name" required value="{{ patient.full_name }}">
                        </div>
                        
                        <div class="row g-3 mb-3">
                            <div class="col-sm-6">
                                <label for="phone" class="form-label fw-medium small">Phone Number</label>
                                <input type="tel" class="form-control" id="phone" name="phone" required value="{{ patient.phone }}">
                            </div>
                            <div class="col-sm-6">
                                <label for="blood_group" class="form-label fw-medium small">Blood Group</label>
                                <select class="form-select" id="blood_group" name="blood_group">
                                    <option value="">Select...</option>
                                    <option value="A+" {% if patient.blood_group == 'A+' %}selected{% endif %}>A+</option>
                                    <option value="A-" {% if patient.blood_group == 'A-' %}selected{% endif %}>A-</option>
                                    <option value="B+" {% if patient.blood_group == 'B+' %}selected{% endif %}>B+</option>
                                    <option value="B-" {% if patient.blood_group == 'B-' %}selected{% endif %}>B-</option>
                                    <option value="O+" {% if patient.blood_group == 'O+' %}selected{% endif %}>O+</option>
                                    <option value="O-" {% if patient.blood_group == 'O-' %}selected{% endif %}>O-</option>
                                    <option value="AB+" {% if patient.blood_group == 'AB+' %}selected{% endif %}>AB+</option>
                                    <option value="AB-" {% if patient.blood_group == 'AB-' %}selected{% endif %}>AB-</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="emergency_contact" class="form-label fw-medium small">Emergency Contact (Name & Phone)</label>
                            <input type="text" class="form-control" id="emergency_contact" name="emergency_contact" value="{{ patient.emergency_contact or '' }}">
                        </div>

                        <div class="mb-2">
                            <label for="address" class="form-label fw-medium small">Home Address</label>
                            <textarea class="form-control" id="address" name="address" rows="3">{{ patient.address or '' }}</textarea>
                        </div>
                    </div>

                    <div class="text-end border-top pt-3">
                        <button type="submit" class="btn btn-primary rounded-pill shadow-primary px-5 w-100 d-md-inline-block" style="max-width: 250px;">
                            <i class="bi bi-save me-1"></i> Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
